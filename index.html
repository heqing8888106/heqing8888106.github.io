<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>李馨芮 | 主页</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", Arial;
      color: white;
      background: #000;
    }

    /* ===== 封面 ===== */
    .cover {
      height: 100vh;
      background: url("photo1.jpg") center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }

    .cover-content {
      position: relative;
      z-index: 1;
    }

    .cover h1 {
      font-size: 80px;
      margin-bottom: 20px;
      text-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    .cover p {
      font-size: 22px;
      max-width: 800px;
      line-height: 1.8;
    }

    /* ===== 向下箭头 ===== */
    .scroll {
      position: absolute;
      bottom: 30px;
      font-size: 30px;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }

    /* ===== 主体渐变背景 ===== */
    .main {
      background:
        radial-gradient(circle at top left, rgba(255,0,153,0.4), transparent 40%),
        radial-gradient(circle at bottom right, rgba(0,204,255,0.3), transparent 40%),
        linear-gradient(135deg, #0f1020, #1b1035, #0a1a2f);
      padding: 60px 30px;
    }

    /* ===== 照片墙 ===== */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      height: 420px;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.4s;
    }

    .card:hover img {
      transform: scale(1.1);
    }

    .text {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    }

    .text h3 {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .text p {
      font-size: 14px;
      line-height: 1.6;
    }

    @media(max-width:900px){
      .gallery{
        grid-template-columns:1fr 1fr;
      }
    }

    @media(max-width:600px){
      .gallery{
        grid-template-columns:1fr;
      }
      .cover h1{
        font-size:50px;
      }
    }

  </style>
</head>

<body>

  <!-- ===== 封面 ===== -->
  <section class="cover">
    <div class="cover-content">
      <h1>李馨芮</h1>
      <p>
        老天爷炫技作品 · 人间颜值外挂 · 氛围感核武器 ·  
        看一眼失眠三天 · 再看一眼开始幻想人生
      </p>
    </div>
    <div class="scroll">↓</div>
  </section>

  <!-- ===== 主体 ===== -->
  <section class="main">

    <div class="gallery">

      <div class="card">
        <img src="photo1.jpg">
        <div class="text">
          <h3>老天爷亲自代言</h3>
          <p>都市魅力核弹头 · 屌丝梦境循环播放素材</p>
        </div>
      </div>

      <div class="card">
        <img src="photo2.jpg">
        <div class="text">
          <h3>心动暴击制造机</h3>
          <p>看一眼脑子宕机 · 再看一眼直接恋爱脑</p>
        </div>
      </div>

      <div class="card">
        <img src="photo3.JPG">
        <div class="text">
          <h3>午夜传说本体</h3>
          <p>社交场神话 · 出现一次就能吹半年</p>
        </div>
      </div>

      <div class="card">
        <img src="photo4.jpg">
        <div class="text">
          <h3>芳心收割机</h3>
          <p>不是她会撩，是她呼吸都在撩</p>
        </div>
      </div>

      <div class="card">
        <img src="photo5.jpg">
        <div class="text">
          <h3>不讲理美貌</h3>
          <p>颜值外挂开启 · 普通人直接退赛</p>
        </div>
      </div>

    </div>

  </section>

</body>
</html>
